services:
  # --- 1. SQL SERVER DATABASE (Docker Instance) ---
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: retail_docker_sql
    user: "0:0"  # <--- ADD THIS LINE (Fixes Windows volume permission error)
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong!Passw0rd
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql/data
    networks:
      - retail_network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourStrong!Passw0rd" -C
      interval: 10s
      retries: 10

  # --- 2. PYTHON ETL & ML RUNNER ---
  etl_runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: retail_etl_runner
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - DB_HOST=sqlserver
      - DB_PORT=1433
      - DB_USER=sa
      - DB_PASSWORD=YourStrong!Passw0rd
      - DB_NAME=retail_warehouse
    networks:
      - retail_network
    command: ["python", "main.py"]

networks:
  retail_network:
    driver: bridge

volumes:
  sqlserver_data: